<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Трекер времени</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="timer">
        <h1>Трекер времени</h1>
        <div class="stopwatch"><span id="timerDisplay">00:00:00</span></div>
            <div class="buttons">
                <button id="btn-start">СТАРТ</button>
                <button id="btn-stop">СТОП</button>
                <button id="btn-reset">ОБНУЛИТЬ</button>
                <button id="btn-save">СОХРАНИТЬ</button>
            </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
